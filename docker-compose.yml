services:
  postgres:
    image: postgres:16-alpine
    container_name: lift-saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lift_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lift_password}
      POSTGRES_DB: ${POSTGRES_DB:-lift_saas}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lift_admin}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lift-saas-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: lift-saas-backend
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lift_admin}:${POSTGRES_PASSWORD:-lift_password}@postgres:5432/${POSTGRES_DB:-lift_saas}?schema=public
    ports:
      - "4000:4000"
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lift-saas-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: lift-saas-frontend
    restart: unless-stopped
    env_file:
      - ./apps/frontend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - lift-saas-network

  adminer:
    image: adminer:latest
    container_name: lift-saas-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - lift-saas-network

volumes:
  postgres_data:

networks:
  lift-saas-network:
    driver: bridge
